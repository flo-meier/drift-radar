name: Drift Radar – weekly scan

on:
  schedule:
    # Sunday 02:00 UTC – fresh report ready for Monday standups.
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      date_range_days:
        description: "Peec look-back window in days"
        required: false
        default: "7"

permissions:
  contents: write  # needed to commit refreshed data/ to main

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python deps
        run: pip install -r pipeline/requirements.txt

      - name: Fetch fresh Peec data (skips cleanly if no API key)
        working-directory: pipeline
        env:
          PEEC_API_KEY: ${{ secrets.PEEC_API_KEY }}
          PEEC_PROJECT_ID: ${{ secrets.PEEC_PROJECT_ID }}
          PEEC_DATE_RANGE_DAYS: ${{ github.event.inputs.date_range_days || '7' }}
        run: python fetch_peec.py

      - name: Extract narrative claims (optional, requires ANTHROPIC_API_KEY)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python extract_claims.py

      - name: Compute metrics + assemble UI JSON
        working-directory: pipeline
        run: python run.py

      - name: Rebuild downloadables (CSV / XLSX / PDF briefs / RSS)
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python export_downloads.py

      - name: Sync data to Astro src/
        working-directory: pipeline
        run: python sync_to_app.py

      - name: Stamp last_scan.json
        env:
          KEY_PRESENT: ${{ secrets.PEEC_API_KEY != '' }}
          TRIGGER: ${{ github.event_name }}
          DATE_RANGE: ${{ github.event.inputs.date_range_days || '7' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WF_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/drift-radar-weekly.yml
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timedelta, timezone

          now = datetime.now(timezone.utc).replace(microsecond=0)
          # Next cron: next Sunday 02:00 UTC
          days_ahead = (6 - now.weekday()) % 7
          if days_ahead == 0 and now.hour >= 2:
              days_ahead = 7
          next_run = (now + timedelta(days=days_ahead)).replace(hour=2, minute=0, second=0)

          payload = {
              "timestamp": now.isoformat().replace("+00:00", "Z"),
              "source": os.environ["TRIGGER"],
              "next_scheduled": next_run.isoformat().replace("+00:00", "Z"),
              "workflow_url": os.environ["WF_URL"],
              "last_run_url": os.environ["RUN_URL"],
              "peec_api_key_present": os.environ["KEY_PRESENT"] == "true",
              "date_range_days": int(os.environ["DATE_RANGE"]),
          }
          with open("src/data/last_scan.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2)
          print(json.dumps(payload, indent=2))
          PY

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name  "drift-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add pipeline/data/ src/data/ public/downloads/ src/data/last_scan.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): weekly drift radar refresh [skip ci]"
            git push
          fi

      - name: Summarise run
        run: |
          echo "### Drift Radar weekly scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- PEEC_API_KEY present: ${{ secrets.PEEC_API_KEY != '' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cloudflare Pages will pick up the commit and redeploy automatically." >> $GITHUB_STEP_SUMMARY
